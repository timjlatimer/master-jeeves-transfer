<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <meta name="format-detection" content="telephone=no" />
    <title>Bingo City</title>
    <!-- Global error suppressor: catches JSON parse errors and other non-critical
         runtime errors before they can crash the app on iOS Safari mobile -->
    <script>
      window.onerror = function(msg, src, line, col, err) {
        // Suppress JSON parse errors from any source (analytics, plugins, etc.)
        if (msg && (
          msg.indexOf('JSON') !== -1 ||
          msg.indexOf('undefined') !== -1 ||
          msg.indexOf('umami') !== -1 ||
          msg.indexOf('analytics') !== -1
        )) {
          return true; // prevents the error from propagating
        }
        return false;
      };
      window.addEventListener('unhandledrejection', function(e) {
        if (e.reason && e.reason.message && (
          e.reason.message.indexOf('JSON') !== -1 ||
          e.reason.message.indexOf('undefined') !== -1
        )) {
          e.preventDefault();
        }
      });
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>

</html>
